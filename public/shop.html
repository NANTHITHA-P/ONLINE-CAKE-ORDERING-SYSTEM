<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop - Cake World</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/8141b5ebac.js" crossorigin="anonymous"></script>

  <style>
    body {
      font-family: 'Delius', cursive;
      background-color: #fff7f7;
    }

    .product-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    .product-card:hover {
      transform: scale(1.03);
    }

    .product-img {
      height: 200px;
      object-fit: cover;
    }

    .product-title {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .product-price {
      color: #f48ca3;
      font-weight: bold;
    }

    .add-btn {
      background-color: #f48ca3;
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
    }

    .add-btn:hover {
      background-color: #e77b95;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-light bg-light px-3">
  <a href="home.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="cart.html">
    Cart 🛒 <span id="cart-count">0</span>
  </a>
</nav>

<div class="container py-5">
  <h2 class="text-center mb-4">Our Delicious Products</h2>
  <div class="row" id="productContainer"></div>
</div>

<script>
const products = [
  { name: "Chocolate Truffle", price: "₹499", image: "cake7.webp" },
  { name: "Strawberry Delight", price: "₹459", image: "cake2.jpg" },
  { name: "Vanilla Cream", price: "₹399", image: "vennila.jpg" },
  { name: "Red Velvet", price: "₹599", image: "cake8.webp" },
  { name: "Black Forest", price: "₹489", image: "cake10.jpg" }
];

// ================= CART COUNT =================
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let count = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cart-count').textContent = count;
}

// ================= ADD TO CART =================
function addToCart(product) {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  if (!Array.isArray(cart)) cart = [];

  let existing = cart.find(item => item.name === product.name);

  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({
      name: product.name,
      price: product.price,
      image: product.image,
      quantity: 1
    });
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();

  alert(product.name + " added to cart!");
}

// ================= RENDER PRODUCTS =================
const container = document.getElementById('productContainer');

products.forEach(product => {
  const card = document.createElement('div');
  card.className = 'col-md-4 mb-4';

  card.innerHTML = `
    <div class="card product-card">
      <img src="${product.image}" class="card-img-top product-img">
      <div class="card-body text-center">
        <h5 class="product-title">${product.name}</h5>
        <p class="product-price">${product.price}</p>

        <button class="add-btn" 
          onclick='addToCart(${JSON.stringify(product).replace(/"/g, "&quot;")})'>
          Add to Cart
        </button>

      </div>
    </div>
  `;

  container.appendChild(card);
});

updateCartCount();
</script>

</body>
</html>
