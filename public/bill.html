<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cream and Crumbs - Customer Bill</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: "Delius", cursive;
        margin: 30px;
        background-color: #fff8f0;
        color: #333;
    }

    .bill-container {
        max-width: 800px;
        margin: auto;
        background: #fff;
        padding: 30px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        border-radius: 12px;
    }

    .header {
        text-align: center;
        border-bottom: 2px dashed #e5c0a0;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .header img {
        width: 100px;
        margin-bottom: 10px;
    }

    .header h1 {
        margin: 0;
        color: #d76d39;
    }

    .details {
        margin-bottom: 20px;
    }

    .details p {
        margin: 4px 0;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }

    th, td {
        border: 1px solid #e5c0a0;
        padding: 10px;
        text-align: center;
    }

    th {
        background-color: #fce8d5;
    }

    .total {
        text-align: right;
        font-size: 18px;
        font-weight: bold;
    }

    .footer {
        text-align: center;
        font-size: 14px;
        margin-top: 30px;
        color: #999;
    }

    .btn-print {
        display: block;
        width: 200px;
        margin: 20px auto;
        background-color: #d76d39;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    @media print {
    .btn-print,
    .input-section {
        display: none !important;
    }
}


    .input-section {
        text-align: center;
        margin-bottom: 30px;
    }

    .input-section input {
        padding: 10px;
        font-size: 16px;
        margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="input-section">
    <label for="orderId">Enter Order ID:</label>
    <input type="text" id="orderId" placeholder="Enter your Order ID" />
    <button class="btn-print" onclick="fetchOrder(this)">Generate Bill</button>
</div>
<div class="bill-container">
    <div class="header">
        <img src="logo.png" alt="Cream and Crumbs Logo">
        <h1>Cream and Crumbs</h1>
        <p><em>Sweeten Your Day!</em></p>
    </div>

    <div class="details">
        <p><strong>Order Id:</strong> <span id="order-id"></span></p>
        <p><strong>Customer Name:</strong> <span id="customer-name"></span></p>
        <p><strong>Order Date:</strong> <span id="order-date"></span></p>
        <p><strong>Payment Mode:</strong> <span id="payment-mode"></span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price (₹)</th>
                <th>Total (₹)</th>
            </tr>
        </thead>
        <tbody id="order-items"></tbody>
    </table>

    <p class="total">Grand Total: ₹<span id="total-amount"></span></p>

    <button class="btn-print" onclick="window.print()"> Print Bill</button>

    <div class="footer">
        <p>Thank you for choosing Cream and Crumbs! Visit again! </p>
    </div>
</div>

<script>
  function fetchOrder(button) {
    const orderIdInput = document.getElementById("orderId");
    const orderId = orderIdInput.value.trim();

    if (!orderId) {
      alert("Please enter a valid Order ID.");
      return;
    }

   fetch(`https://online-cake-ordering-system-yps7.onrender.com/api/orders/${orderId}`)
  .then(res => {
    if (!res.ok) {
      throw new Error("Order not found");
    }
    return res.json();
  })
  .then(result => {
    const order = result.order;

    document.getElementById("order-id").innerText = order.orderId;
    document.getElementById("customer-name").innerText = order.name;
    document.getElementById("order-date").innerText = order.order_date;
    document.getElementById("payment-mode").innerText =
      order.payment_mode || "Credit Card";

    const tbody = document.getElementById("order-items");
    tbody.innerHTML = "";

    let grandTotal = 0;

    order.cart.forEach(item => {
      const product = item.product_name || item.name || item.item || "N/A";
      const quantity = parseInt(item.quantity || item.qty || 1);
      let price = item.price || item.cost || 0;

      if (typeof price === "string") {
        price = price.replace(/[^\d.]/g, "");
      }

      price = parseFloat(price) || 0;
      const total = quantity * price;
      grandTotal += total;

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${product}</td>
        <td>${quantity}</td>
        <td>₹${price.toFixed(2)}</td>
        <td>₹${total.toFixed(2)}</td>
      `;
      tbody.appendChild(row);
    });

    document.getElementById("total-amount").innerText =
      grandTotal.toFixed(2);
  })
  .catch(err => {
    alert(err.message);
    console.error(err);
  });
  }
</script>
</body>
</html>
