<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cream and Crumbs - Login / Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    body {
      background-color: #f9f1e7;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      margin: 0;
      color: #333;
    }

    .main-container {
      max-width: 500px;
      width: 100%;
      padding: 40px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      margin: 0 auto;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-bottom: 15px;
      text-align: center;
      color: #ff6f61;
    }

    p.description {
      font-size: 1rem;
      text-align: center;
      margin-bottom: 30px;
      color: #ff9f00;
    }

    .form-container {
      display: none;
    }

    .form-container.active {
      display: block;
    }

    .form-label {
      text-align: left;
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .form-control {
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      background-color: #f7f1f0;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      border-color: #ff6f61;
      box-shadow: 0 0 5px rgba(255, 111, 97, 0.4);
    }

    .btn-primary {
      background-color: #ff6f61;
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 30px;
      margin-top: 15px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #e05650;
    }

    .toggle-link {
      margin-top: 15px;
      font-size: 1rem;
      text-align: center;
      color: #ff9f00;
    }

    .toggle-link span {
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-link span:hover {
      text-decoration: underline;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin-top: 20px;
    }
  </style>
</head>
<body>

 <div class="main-container">
    <h2>Cream and Crumbs</h2>
    <p class="description">Log in or Sign Up to access your account and explore our delicious cakes.</p>

    <!-- Login Form -->
    <div id="loginForm" class="form-container active"> <!-- Added active class and correct ID -->
      <form id="loginFormElement">
        <div class="form-group">
          <label for="loginEmail">Email address</label>
          <input type="email" class="form-control" id="loginEmail" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" class="form-control" id="loginPassword" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <div class="toggle-link">
        Don't have an account? <span onclick="toggleForm('signup')">Sign Up</span>
      </div>
    </div>

    <!-- Sign Up Form -->
    <div id="signupForm" class="form-container"> <!-- Now properly inside main-container -->
      <form id="signupFormElement">
        <div class="mb-3 text-start">
          <label for="signupName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="signupName" required>
        </div>
        <div class="mb-3 text-start">
          <label for="signupEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="signupEmail" required>
        </div>
        <div class="mb-3 text-start">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="signupPassword" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>
      <div class="toggle-link">
        Already have an account? <span onclick="toggleForm('login')">Login</span>
      </div>
    </div>
  </div>

  <div class="footer-text">
    <p>&copy; 2025 Cream and Crumbs. All Rights Reserved.</p>
  </div>

  <script>
    // Initialize with login form active
    function toggleForm(type) {
      document.getElementById('loginForm').classList.toggle('active', type === 'login');
      document.getElementById('signupForm').classList.toggle('active', type === 'signup');
    }
    // Signup functionality
    document.getElementById('signupFormElement').addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;

      fetch('https://online-cake-ordering-system-yps7.onrender.com/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })
        .then(res => res.json())
        .then(data => {
          if (data.message === 'User registered successfully') {
            alert('Signup successful! Please login.');
            toggleForm('login');
          } else {
            alert(data.message || 'Signup failed');
          }
        })
        .catch(err => {
          console.error('Signup error:', err);
          alert('An error occurred during signup.');
        });
    });

    // Login functionality
    document.getElementById('loginFormElement').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    // Show loading state
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalBtnText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in...';

    fetch('https://online-cake-ordering-system-yps7.onrender.com/login', {  // Removed hardcoded URL - use relative path
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify({ email, password }),
        credentials: 'include'  // Important for session cookies
    })
    .then(async (res) => {
        const data = await res.json();
        
        if (!res.ok) {
            // Handle HTTP errors (400, 500, etc.)
            throw new Error(data.message || 'Login failed');
        }
        
        if (data.message === 'Login successful') {
            // Store minimal user data in localStorage if needed
            localStorage.setItem('userEmail', email);
            
            // Redirect based on backend response or default to home
            window.location.href = data.redirect || 'home.html';
        } else {
            throw new Error(data.message || 'Invalid credentials');
        }
    })
    .catch(err => {
        console.error('Login error:', err);
        alert(err.message);
    })
    .finally(() => {
        // Restore button state
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
    });
});
  </script>
</body>
</html>
