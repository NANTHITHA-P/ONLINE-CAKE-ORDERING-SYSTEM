<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Delius", cursive;
      margin: 30px;
      background-color: #fff8f0;
      color: #333;
    }

    .cart-item {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
    }

    .cart-img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

    .cart-details {
      flex: 1;
      padding-left: 20px;
    }

    .qty-box {
      width: 80px;
    }
  </style>
</head>

<body class="container mt-4">

  <h2 class="mb-4">Your Cart 🛒</h2>

  <div id="cart-items"></div>

  <h4 class="mt-3">Total: ₹<span id="total-price">0</span></h4>

  <a href="shop.html" class="btn btn-success mt-2">Shop Now</a>

  <!-- Checkout -->
  <div class="mt-5">
    <h3>Checkout</h3>

    <form id="checkout-form" class="row g-3">
      <div class="col-md-6">
        <input type="text" class="form-control" id="name" placeholder="Full Name" required>
      </div>

      <div class="col-md-6">
        <input type="email" class="form-control" id="email" placeholder="Email" required>
      </div>

      <div class="col-md-6">
        <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
      </div>

      <div class="col-12">
        <textarea class="form-control" id="address" rows="3" placeholder="Address" required></textarea>
      </div>

      <div class="col-12">
        <button class="btn btn-primary">Place Order</button>
      </div>
    </form>
  </div>

<script>
let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
let total = 0;

const cartContainer = document.getElementById('cart-items');
const totalDisplay = document.getElementById('total-price');

function saveCart() {
  localStorage.setItem('cart', JSON.stringify(cartItems));
}

// ================= RENDER CART =================
function renderCart() {
  cartContainer.innerHTML = '';
  total = 0;

  if (cartItems.length === 0) {
    cartContainer.innerHTML = "<p>Your cart is empty 🛒</p>";
    totalDisplay.textContent = 0;
    return;
  }

  cartItems.forEach((item, index) => {

    const price = Number(item.price.toString().replace("₹", ""));
    const quantity = item.quantity || 1;
    const subtotal = price * quantity;

    total += subtotal;

    const div = document.createElement('div');
    div.className = 'cart-item';

    div.innerHTML = `
      <img src="${item.image}" class="cart-img" />

      <div class="cart-details">
        <h5>${item.name}</h5>
        <p>Price: ₹${price}</p>

        <div class="d-flex align-items-center gap-2">
          <label>Qty:</label>

          <input type="number"
                 min="1"
                 value="${quantity}"
                 class="form-control qty-box quantity-input"
                 data-index="${index}">
        </div>

        <p class="mt-2"><strong>Subtotal: ₹${subtotal}</strong></p>
      </div>

      <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">
        Remove
      </button>
    `;

    cartContainer.appendChild(div);
  });

  totalDisplay.textContent = total;

  // quantity update
  document.querySelectorAll('.quantity-input').forEach(input => {
    input.addEventListener('change', (e) => {
      const i = e.target.dataset.index;
      cartItems[i].quantity = Number(e.target.value) || 1;
      saveCart();
      renderCart();
    });
  });
}

// ================= REMOVE =================
function removeItem(index) {
  cartItems.splice(index, 1);
  saveCart();
  renderCart();
}

// ================= CHECKOUT =================
document.getElementById('checkout-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  if (cartItems.length === 0) {
    alert("Cart is empty!");
    return;
  }

  let finalTotal = 0;

  cartItems.forEach(item => {
    const price = Number(item.price.toString().replace("₹", ""));
    const qty = item.quantity || 1;
    finalTotal += price * qty;
  });

  const orderData = {
  name: document.getElementById('name').value,
  email: document.getElementById('email').value,
  phone: document.getElementById('phone').value,
  address: document.getElementById('address').value,
  cart: cartItems,
  total: finalTotal
};
  const res = await fetch("https://online-cake-ordering-system-yps7.onrender.com/api/orders", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(orderData)
  });

  const data = await res.json();

  if (res.ok) {
    alert("Order placed successfully!");
    localStorage.removeItem("cart");
    location.reload();
  } else {
    alert("Order failed!");
  }
});

renderCart();
</script>

</body>
</html>
