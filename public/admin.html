<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/8141b5ebac.js" crossorigin="anonymous"></script>
  <!-- AOS Animation Library -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
  <link href="s1.css" rel="stylesheet">
  <title>Admin Panel - Cream and Crumbs</title>
</head>
<body>
  <!-- Navbar -->
  <nav class="custom-navbar">
    <ul class="nav-links">
      <li><a href="admin_dashboard.html" class="active">Dashboard</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="logout.html">Logout</a></li>
    </ul>
    <div class="icon-links">
      <a href="admin_cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
      <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="text-center">Admin Dashboard</h2>

    <div class="row">
      <!-- Sidebar (optional) -->
      <div class="col-md-3">
        <div class="list-group">
          <a href="admin_dashboard.html" class="list-group-item list-group-item-action">Dashboard</a>
          <a href="orders.html" class="list-group-item list-group-item-action">Orders</a>
          <a href="products.html" class="list-group-item list-group-item-action">Products</a>
          <a href="users.html" class="list-group-item list-group-item-action">Users</a>
        </div>
      </div>

      <div class="container mt-5">
        <h2 class="text-center">Manage Orders</h2>
        <table class="table table-striped" id="ordersTable">
          <thead>
            <tr>
              <th scope="col">Order ID</th>
              <th scope="col">Customer Name</th>
              <th scope="col">Total Amount</th>
              <th scope="col">Order Date</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <!-- Orders will be dynamically inserted here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
   // Fetch all orders and populate the table
  fetch('http://localhost:5000/api/orders')
    .then(response => response.json())
    .then(data => {
      const tableBody = document.getElementById('orderTableBody');
     data.forEach(order => {
  const row = document.createElement('tr');
  const formattedDate = new Date(order.date).toLocaleString();
  row.innerHTML = `
    <td>${order.orderId}</td>
    <td>${order.name}</td>
    <td>₹${order.total}</td>
    <td>${formattedDate}</td>
    <td>
      <a href="view_order.html?orderId=${order.orderId}" class="btn btn-info btn-sm">View</a>
      <button class="btn btn-danger btn-sm" onclick="deleteOrder('${order.orderId}')">Delete</button>
    </td>
  `;
  tableBody.appendChild(row);
});
    })
    .catch(error => {
      console.error('Error fetching orders:', error);
    });

  // Delete order function
  function deleteOrder(orderId) {
    fetch(`http://localhost:5000/api/orders/${orderId}`, {
      method: 'DELETE',
    })
      .then(response => response.json())
      .then(data => {
        alert(data.message);
        location.reload(); // Reload the page to update the orders list
      })
      .catch(error => {
        console.error('Error deleting order:', error);
        alert('Failed to delete order');
      });
  }
</script>
  <script>  AOS.init();</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
