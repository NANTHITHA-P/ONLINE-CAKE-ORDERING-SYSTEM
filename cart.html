<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
  <style>
     body {
        font-family: "Delius", cursive;
        margin: 30px;
        background-color: #fff8f0;
        color: #333;
    }
    .cart-item {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="container mt-5">
  <h2>Your Cart 🛒</h2>
  <div id="cart-items"></div>
  <h4 class="mt-4">Total: ₹<span id="total-price">0</span></h4>
  <a href="shop.html"> <button type="button" class=" btn btn-success">Shop now</button></a>
  <div class="mt-5">
    <h3>Checkout</h3>
    <form id="checkout-form" class="row g-3">
      <div class="col-md-6">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="col-md-6">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="col-md-6">
        <label for="phone" class="form-label">Phone</label>
        <input type="tel" class="form-control" id="phone" required>
      </div>
      <div class="col-12">
        <label for="address" class="form-label">Shipping Address</label>
        <textarea class="form-control" id="address" rows="3" required></textarea>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Place Order</button>
      </div>
    </form>
  </div>
  <script>
    let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0; // Define globally
    const cartContainer = document.getElementById('cart-items');
    const totalDisplay = document.getElementById('total-price');
  
    function renderCart() {
      cartContainer.innerHTML = '';
      total = 0; // Reset total every time cart is rendered
  
      if (cartItems.length === 0) {
        cartContainer.innerHTML = '<p>Your cart is empty.</p>';
        totalDisplay.textContent = 0;
        return;
      }
  
      cartItems.forEach((item, index) => {
        const price = parseInt(item.price.replace("₹", ""));
        const quantity = item.quantity || 1;
        const subtotal = price * quantity;
        total += subtotal;
  
        const div = document.createElement('div');
        div.className = 'cart-item row align-items-center';
        div.innerHTML = `
          <div class="col-md-3">
            <img src="${item.image}" alt="${item.name}" />
          </div>
          <div class="col-md-6">
            <h5>${item.name}</h5>
            <p>Price: ₹${price}</p>
            <div class="d-flex align-items-center">
              <label class="me-2 mb-0">Qty:</label>
              <input type="number" min="1" value="${quantity}" class="form-control form-control-sm quantity-input" data-index="${index}" style="width: 70px;">
            </div>
            <p class="mt-2 mb-0"><strong>Subtotal: ₹${subtotal}</strong></p>
          </div>
          <div class="col-md-3 text-end">
            <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">Remove</button>
          </div>
        `;
        cartContainer.appendChild(div);
      });
  
      totalDisplay.textContent = total;
  
      // Quantity change listeners
      document.querySelectorAll('.quantity-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const idx = e.target.dataset.index;
          cartItems[idx].quantity = parseInt(e.target.value) || 1;
          localStorage.setItem('cart', JSON.stringify(cartItems));
          renderCart(); // Re-render
        });
      });
    }
  
    function removeItem(index) {
      cartItems.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cartItems));
      renderCart();
    }
  
    document.getElementById('checkout-form').addEventListener('submit', async function (e) {
      e.preventDefault();
  
      if (cartItems.length === 0) {
        alert("Your cart is empty!");
        return;
      }
  
      // Make sure the latest cart is used
      cartItems = JSON.parse(localStorage.getItem('cart')) || [];
  
      // Recalculate total based on latest cart
      total = 0;
      cartItems.forEach(item => {
        const price = parseInt(item.price.replace("₹", ""));
        const quantity = item.quantity || 1;
        total += price * quantity;
      });
  
      const orderData = {
  name: document.getElementById('name').value,
  email: document.getElementById('email').value,
  phone: document.getElementById('phone').value,
  address: document.getElementById('address').value,
  cart: cartItems.map(item => ({
    product_name: item.name,
    quantity: item.quantity || 1,
    price: parseInt(item.price.replace("₹", "")) // Convert string to number
  })),
  total: total
};

      const response = await fetch("http://localhost:3000/api/orders", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
      });
  
      const result = await response.json();
      if (response.ok) {
        alert("Order placed successfully!");
        localStorage.removeItem("cart");
        window.location.reload();
      } else {
        alert("Failed to place order. Please try again.");
      }
    });
  
    renderCart();
  </script> 
</body>
</html>
