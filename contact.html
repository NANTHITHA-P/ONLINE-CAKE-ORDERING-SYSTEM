<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Cream and Crumbs</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/8141b5ebac.js" crossorigin="anonymous"></script>
<!-- AOS Animation Library -->
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <link href="s1.css" rel="stylesheet">

  <style>
    body {
      font-family: "Delius", cursive;
      background-color: #f9f9f9;
      padding-top: 50px;
    }

    .contact-form {
      background-color: #fff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      padding: 30px;
      margin-top: 50px;
    }

    .contact-form h2 {
      text-align: center;
      color: #333;
      font-weight: 600;
      margin-bottom: 25px;
    }

    .form-group label {
      font-weight: 500;
      color: #555;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 12px;
      font-size: 16px;
    }

    .form-control:focus {
      border-color: #0066cc;
      box-shadow: 0 0 5px rgba(0, 102, 204, 0.3);
    }

    .form-button {
      background-color: #0066cc;
      color: #fff;
      font-weight: 600;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      font-size: 16px;
    }

    .form-button:hover {
      background-color: #0052a3;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .footer-text {
      text-align: center;
      margin-top: 50px;
      font-size: 14px;
      color: #777;
    }

    .container {
      max-width: 800px;
    }

    @media (max-width: 768px) {
      .container {
        margin: 0 15px;
      }
    }

  </style>
</head>
<body><nav class="custom-navbar">
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="about.html" >About</a></li>
      <li><a href="#"><img src="logo.png" alt="Logo" class="logo"></a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="bill.html" >Generate Bill</a></li>
    </ul>
    <div class="icon-links">
      <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
      <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
    </div>
  </nav>

  <!-- Contact Form -->
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="contact-form">
          <h2>Contact Us</h2>
          <form id="contactForm">
            <!-- Name Field -->
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            
            <!-- Email Field -->
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" class="form-control" placeholder="Your email address" required>
            </div>

            <!-- Subject Field -->
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" class="form-control" placeholder="Subject of your message" required>
            </div>

            <!-- Message Field -->
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" class="form-control" rows="6" placeholder="Your message" required></textarea>
            </div>

            <!-- Submit Button -->
            <div class="form-group text-center">
              <button type="submit" class="form-button">Send Message</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-text">
    <p>&copy; 2025 Cream and Crumbs. All Rights Reserved.</p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Handle form submission
    document.getElementById('contactForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const formData = new FormData(this);
      const data = {};
      formData.forEach((value, key) => {
        data[key] = value;
      });

      fetch('/api/contact', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message); // Display success message
        document.getElementById('contactForm').reset(); // Reset form after submission
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Something went wrong, please try again later.');
      });
    });
  </script>
</body>
</html>
